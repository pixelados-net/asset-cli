name: Notify Discord On Tag

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  notify:
    name: Notify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TAG_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          commit_sha="$(git rev-list -n 1 "$TAG_NAME")"
          short_sha="${commit_sha:0:7}"
          commit_url="${SERVER_URL}/${REPO}/commit/${commit_sha}"
          commit_message="$(git log -1 --format=%B "$commit_sha")"
          commit_author="$(git log -1 --format=%an "$commit_sha")"
          payload=$(jq -n \
            --arg tag "$TAG_NAME" \
            --arg repo "$REPO" \
            --arg sha "$short_sha" \
            --arg url "$commit_url" \
            --arg message "$commit_message" \
            --arg author "$commit_author" \
            '{
              embeds: [{
                title: ("asset-cli - new version flagged " + $tag),
                url: $url,
                description: $message,
                color: 5814783,
                fields: [
                  { name: "Repository", value: $repo, inline: true },
                  { name: "Commit", value: $sha, inline: true },
                  { name: "Author", value: $author, inline: true }
                ]
              }]
            }')
          curl --silent --show-error --fail --retry 3 \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "$DISCORD_WEBHOOK_URL"
